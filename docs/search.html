<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Search</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                width: 100%;
                height: 100%;
                background: #000000;
                color: #ffffff;
                font-family: "Avenir Next", "Trebuchet MS", "Gill Sans", sans-serif;
            }

            .page {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                min-height: 100vh;
            }

            .placeholder {
                font-size: 24px;
                font-weight: 400;
                color: rgba(255, 255, 255, 0.4);
                letter-spacing: 0.04em;
            }
        </style>
    </head>
    <body>
        <div class="page">
            <span class="placeholder">Search</span>
        </div>
    </body>
</html>
